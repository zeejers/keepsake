name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # Create the draft release once so the parallel build jobs don't race
  # (racing produces duplicate drafts with assets split between them).
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/github-script@v7
        id: create
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.GITHUB_REF_NAME,
              name: `Keepsake ${process.env.GITHUB_REF_NAME}`,
              body: 'See the assets below to download and install.',
              draft: true,
            })
            return data.id

  # Duplicate each versioned asset under a stable name so
  # /releases/latest/download/<stable-name> links never go stale.
  stable-asset-names:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const releaseId = Number('${{ needs.create-release.outputs.release_id }}')
            const { owner, repo } = context.repo
            const stable = [
              [/aarch64\.dmg$/, 'Keepsake-macos-arm64.dmg'],
              [/x64\.dmg$/, 'Keepsake-macos-intel.dmg'],
              [/-setup\.exe$/, 'Keepsake-windows-setup.exe'],
              [/\.msi$/, 'Keepsake-windows.msi'],
              [/\.AppImage$/, 'Keepsake-linux.AppImage'],
              [/\.deb$/, 'Keepsake-linux.deb'],
              [/\.rpm$/, 'Keepsake-linux.rpm'],
            ]
            const { data: assets } = await github.rest.repos.listReleaseAssets({ owner, repo, release_id: releaseId, per_page: 100 })
            for (const [re, name] of stable) {
              if (assets.some(a => a.name === name)) continue
              const src = assets.find(a => re.test(a.name) && !a.name.startsWith('Keepsake-macos') && !a.name.startsWith('Keepsake-windows') && !a.name.startsWith('Keepsake-linux'))
              if (!src) continue
              const download = await github.request('GET /repos/{owner}/{repo}/releases/assets/{asset_id}', {
                owner, repo, asset_id: src.id, headers: { accept: 'application/octet-stream' },
              })
              await github.rest.repos.uploadReleaseAsset({
                owner, repo, release_id: releaseId, name,
                data: Buffer.from(download.data),
                headers: { 'content-type': 'application/octet-stream', 'content-length': src.size },
              })
              console.log(`uploaded ${name} (from ${src.name})`)
            }

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest # Intel
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04 # .deb + .AppImage
            args: ''
          - platform: windows-latest # .msi + .exe
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization (optional — set these secrets to enable):
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
