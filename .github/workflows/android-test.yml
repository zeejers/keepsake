# Temporary: iterate on the Android release build without cutting a release.
# The build steps here are mirrored in release.yml's build-android job.
name: Android build test

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install NDK
        run: |
          echo "y" | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "ndk;27.2.12479018"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - run: npm ci

      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keepsake.keystore"
          cat > src-tauri/gen/android/keystore.properties <<EOF
          keyAlias=$ANDROID_KEY_ALIAS
          password=$ANDROID_KEYSTORE_PASSWORD
          storeFile=$RUNNER_TEMP/keepsake.keystore
          EOF

      - name: Build APK
        run: npx tauri android build --apk --target aarch64

      - uses: actions/upload-artifact@v4
        with:
          name: Keepsake-android
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk
