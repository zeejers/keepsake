      <stop offset="0" stop-color="#1d2430"/>
      <stop offset="1" stop-color="#0e1116"/>
    </linearGradient>
    <linearGradient id="key" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#45e0b2"/>
